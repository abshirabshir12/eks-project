apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 61.3.0
    helm:
      values: |
        grafana:
          enabled: false
        alertmanager:
          enabled: false
        crds:
          enabled: true
        prometheus:
          prometheusSpec:
            retention: 15d
            resources:
              requests:
                memory: "400Mi"
                cpu: "250m"
              limits:
                memory: "800Mi"
                cpu: "500m"
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true