apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eks-proj-bootstrap
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/abshirabshir12/eks-project
    targetRevision: HEAD
    path: helm
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true